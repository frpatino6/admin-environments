<div class="min-h-screen px-4 py-10 sm:px-6 lg:px-10 font-sans">

  <!-- Header -->
  <header class="mx-auto mb-12 max-w-4xl text-center animate-fade-in">
    <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-violet-500/20 bg-violet-500/10 px-3.5 py-1 text-xs font-semibold text-violet-300 tracking-wide">
      <span class="relative flex h-1.5 w-1.5">
        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-violet-400 opacity-75"></span>
        <span class="relative inline-flex h-1.5 w-1.5 rounded-full bg-violet-500"></span>
      </span>
      Tiempo real
    </div>
    <h1 class="text-5xl font-bold tracking-tight text-white">
      Admin
      <span class="bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">
        Ambientes
      </span>
    </h1>
    <p class="mt-3 text-sm text-slate-500">Gestión de ambientes de desarrollo</p>
  </header>

  <!-- Skeleton loader -->
  @if (loading()) {
    <div class="mx-auto grid max-w-4xl grid-cols-1 gap-6 sm:grid-cols-2">
      @for (i of [1, 2]; track i) {
        <div class="rounded-2xl border border-white/5 bg-white/[0.03] p-6 animate-skeleton">
          <div class="mb-5 flex items-start justify-between">
            <div class="space-y-2">
              <div class="h-7 w-20 rounded-lg bg-white/10"></div>
              <div class="h-2.5 w-14 rounded bg-white/5"></div>
            </div>
            <div class="h-7 w-20 rounded-full bg-white/10"></div>
          </div>
          <div class="mb-2 h-3.5 w-full rounded bg-white/5"></div>
          <div class="mb-5 h-3.5 w-3/4 rounded bg-white/5"></div>
          <div class="h-10 w-full rounded-xl bg-white/10"></div>
          <div class="mt-5 border-t border-white/5 pt-4 space-y-3">
            @for (j of [1, 2, 3]; track j) {
              <div class="flex items-start gap-2.5">
                <div class="h-5 w-5 shrink-0 rounded-full bg-white/10"></div>
                <div class="flex-1 space-y-1.5">
                  <div class="h-2.5 w-3/4 rounded bg-white/10"></div>
                  <div class="h-2 w-1/2 rounded bg-white/5"></div>
                </div>
              </div>
            }
          </div>
        </div>
      }
    </div>
  }

  <!-- Environment cards -->
  @if (!loading()) {
    <div class="mx-auto grid max-w-4xl grid-cols-1 gap-6 sm:grid-cols-2">
      @for (env of environments(); track env._id) {
        <app-environment-card
          [env]="env"
          (deployClicked)="onDeploy($event)"
          (releaseClicked)="onRelease($event)" />
      }

      @empty {
        <div class="col-span-2 flex flex-col items-center gap-3 py-16 text-slate-600">
          <svg class="h-10 w-10 opacity-40" fill="none" viewBox="0 0 24 24" stroke-width="1.2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 14.25h13.5m-13.5 0a3 3 0 0 1-3-3m3 3a3 3 0 1 0 6 0m-6 0H3.375M18.75 14.25a3 3 0 0 0 3-3m-3 3a3 3 0 1 1-6 0m6 0h2.625M12 14.25V8.25" />
          </svg>
          <p class="text-sm">Sin ambientes configurados</p>
        </div>
      }
    </div>

    <div class="mt-8 flex justify-center">
      <button
        (click)="refresh()"
        class="flex items-center gap-2 rounded-xl border border-white/10 bg-white/[0.04] px-5 py-2.5 text-sm font-medium text-slate-500 transition-all duration-200 hover:bg-white/[0.08] hover:text-slate-300">
        <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" />
        </svg>
        Actualizar
      </button>
    </div>
  }

</div>
