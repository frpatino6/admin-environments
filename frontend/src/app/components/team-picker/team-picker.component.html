<div class="min-h-screen flex flex-col items-center px-4 py-8 sm:px-6 lg:px-10 font-sans">

  <!-- Header -->
  <header class="mb-12 text-center animate-fade-in">
    <div class="mb-4 inline-flex items-center gap-2 rounded-full border border-violet-500/20 bg-violet-500/10 px-3.5 py-1 text-xs font-semibold text-violet-300 tracking-wide">
      <span class="relative flex h-1.5 w-1.5">
        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-violet-400 opacity-75"></span>
        <span class="relative inline-flex h-1.5 w-1.5 rounded-full bg-violet-500"></span>
      </span>
      Tiempo real
    </div>
    <h1 class="text-5xl font-bold tracking-tight text-white">
      Admin
      <span class="bg-gradient-to-r from-violet-400 to-indigo-400 bg-clip-text text-transparent">
        Ambientes
      </span>
    </h1>
    <p class="mt-3 text-sm text-slate-500">Selecciona tu equipo</p>
  </header>

  <!-- Skeleton -->
  @if (loading()) {
    <div class="grid w-full grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 max-w-4xl">
      @for (i of [1, 2, 3]; track i) {
        <div class="h-44 rounded-2xl border border-white/5 bg-white/[0.03] animate-skeleton"></div>
      }
    </div>
  }

  <!-- Team cards -->
  @if (!loading()) {
    <div class="grid w-full grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3 max-w-4xl">
      @for (team of teams(); track team.slug) {
        <button
          type="button"
          (click)="selectTeam(team)"
          class="group relative flex flex-col gap-4 rounded-2xl border border-white/10 bg-white/[0.04] p-6 text-left shadow-glass backdrop-blur-[12px] transition-all duration-300 hover:-translate-y-1 hover:border-violet-500/30 hover:bg-white/[0.07] hover:drop-shadow-[0_20px_40px_rgba(0,0,0,0.5)] animate-slide-up">

          <!-- Top accent line -->
          <div class="absolute inset-x-0 top-0 h-px rounded-t-2xl bg-gradient-to-r from-transparent via-violet-400/50 to-transparent"></div>

          <!-- Icon + arrow row -->
          <div class="flex items-center justify-between">
            <div class="flex h-11 w-11 items-center justify-center rounded-xl bg-gradient-to-br from-violet-600/30 to-indigo-600/30 ring-1 ring-violet-500/20 text-base font-bold text-violet-300">
              {{ team.displayName.charAt(0) }}
            </div>
            <svg class="h-4 w-4 text-slate-600 transition-all duration-200 group-hover:translate-x-0.5 group-hover:text-violet-400" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            </svg>
          </div>

          <!-- Name + subtitle -->
          <div>
            <h2 class="text-xl font-bold tracking-wider text-white">{{ team.displayName }}</h2>
            <p class="mt-0.5 text-xs text-slate-500">
              {{ team.environments.length }} ambiente{{ team.environments.length !== 1 ? 's' : '' }}
            </p>
          </div>

          <!-- Env badges -->
          <div class="flex flex-wrap gap-1.5">
            @for (env of team.environments; track env) {
              <span class="rounded-md bg-slate-800/60 px-2 py-0.5 font-mono text-[10px] text-slate-400 ring-1 ring-white/5">
                {{ env }}
              </span>
            }
          </div>
        </button>
      }

      @empty {
        <div class="col-span-3 flex flex-col items-center gap-3 py-16 text-slate-600">
          <p class="text-sm">Sin equipos configurados</p>
        </div>
      }
    </div>
  }

</div>
