<button
  type="button"
  (click)="handleClick()"
  [disabled]="disabled"
  class="flex w-full items-center justify-center gap-2 rounded-xl px-4 py-2.5 text-sm font-medium text-white transition-all duration-200 ease-in-out
         bg-gradient-to-b from-red-500 to-red-600
         hover:scale-[1.02] hover:shadow-[0_0_20px_rgba(220,38,38,0.4)]
         active:scale-[0.98]
         disabled:cursor-not-allowed disabled:scale-100 disabled:opacity-40
         disabled:from-slate-600 disabled:to-slate-700 disabled:shadow-none">
  <svg class="h-4 w-4 opacity-90" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
    <path stroke-linecap="round" stroke-linejoin="round"
          d="M13.5 10.5V6.75a4.5 4.5 0 1 1 9 0v3.75M3.75 21.75h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H3.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
  </svg>
  {{ label }}
</button>
