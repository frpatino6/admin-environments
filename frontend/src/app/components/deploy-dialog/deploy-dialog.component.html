<div class="relative overflow-hidden rounded-2xl border border-white/10 bg-[#0f0f2a]/95 p-6 shadow-glass-lg backdrop-blur-[16px]">
  <!-- Top glow line -->
  <div class="absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-violet-500/40 to-transparent"></div>

  <!-- Header -->
  <div class="mb-5 flex items-center gap-3">
    <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-xl bg-violet-500/15 ring-1 ring-violet-500/25">
      <svg class="h-5 w-5 text-violet-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15.59 14.37a6 6 0 0 1-5.84 7.38v-4.8m5.84-2.58a14.98 14.98 0 0 0 6.16-12.12A14.98 14.98 0 0 0 9.631 8.41m5.96 5.96a14.926 14.926 0 0 1-5.841 2.58m-.119-8.54a6 6 0 0 0-7.381 5.84h4.8m2.581-5.84a14.927 14.927 0 0 0-2.58 5.84m2.699 2.7c-.103.021-.207.041-.311.06a15.09 15.09 0 0 1-2.448-2.448 14.9 14.9 0 0 1 .06-.312m-2.24 2.39a4.493 4.493 0 0 0-1.757 4.306 4.493 4.493 0 0 0 4.306-1.758M16.5 9a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0Z" />
      </svg>
    </div>
    <div>
      <h2 class="text-base font-bold text-white">Desplegar en {{ data.environmentName }}</h2>
      <p class="text-xs text-slate-500">Completa los datos para ocupar el ambiente</p>
    </div>
  </div>

  <!-- Fields -->
  <div class="space-y-4">
    <div>
      <label class="mb-1.5 block text-xs font-medium text-slate-400">Nombre de la rama</label>
      <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
          <svg class="h-4 w-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 6.75 22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3-4.5 16.5" />
          </svg>
        </div>
        <input
          [ngModel]="branch()"
          (ngModelChange)="branch.set($event)"
          (keyup.enter)="isValid() && onDeploy()"
          placeholder="feature/nueva-funcionalidad"
          class="w-full rounded-xl border border-white/10 bg-white/5 py-2.5 pl-9 pr-4 font-mono text-sm text-white placeholder-slate-700 outline-none transition-all duration-200 focus:border-violet-500/40 focus:bg-white/[0.07] focus:ring-1 focus:ring-violet-500/25" />
      </div>
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-medium text-slate-400">Tu nombre</label>
      <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 left-3 flex items-center">
          <svg class="h-4 w-4 text-slate-600" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
        </div>
        <input
          [ngModel]="deployedBy()"
          (ngModelChange)="deployedBy.set($event)"
          (keyup.enter)="isValid() && onDeploy()"
          placeholder="Juan Pérez"
          class="w-full rounded-xl border border-white/10 bg-white/5 py-2.5 pl-9 pr-4 text-sm text-white placeholder-slate-700 outline-none transition-all duration-200 focus:border-violet-500/40 focus:bg-white/[0.07] focus:ring-1 focus:ring-violet-500/25" />
      </div>
    </div>
  </div>

  <!-- Actions -->
  <div class="mt-6 flex gap-3">
    <button
      (click)="onCancel()"
      class="flex flex-1 items-center justify-center rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-sm font-medium text-slate-400 transition-all duration-200 hover:bg-white/10 hover:text-slate-200">
      Cancelar
    </button>
    <button
      (click)="onDeploy()"
      [disabled]="!isValid()"
      class="flex flex-1 items-center justify-center gap-2 rounded-xl bg-gradient-to-r from-violet-600 to-indigo-600 px-4 py-2.5 text-sm font-semibold text-white shadow-lg transition-all duration-200 hover:scale-[1.02] hover:shadow-violet-500/25 disabled:cursor-not-allowed disabled:opacity-40 active:scale-[0.98]">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
      </svg>
      Desplegar
    </button>
  </div>
</div>
